  <head>
    <meta charset="UTF-8" />

    <title>Química Analítica Avançada - Counter Current Extraction</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="head">
      <h1>Counter current for 2 analytes</h1>
      <img src="../public/logo.png" alt="logo" />
    </div>

    <div id="frame">
      <div class="infos">
        <div class="info">
          <p>K<sub>M</sub> = C<sub>extractant</sub> / C<sub>sample</sub>:</p>
          <input id="KM" type="text" />
        </div>
        <div class="info">
          <p>K<sub>N</sub> = C<sub>extractant</sub> / C<sub>sample</sub>:</p>
          <input id="KN" type="text" />
        </div>
        <div class="info">
          <p>mass of M (g):</p>
          <input id="Mw" type="text" />
        </div>
        <div class="info">
          <p>mass of N (g):</p>
          <input id="Nw" type="text" />
        </div>
        <div class="info">
          <p>Sample Volume (mL):</p>
          <input id="sample_v" type="text" />
        </div>
        <div class="info">
          <p>Extractant Volume (mL):</p>
          <input id="extractant_v" type="text" />
        </div>
        <div class="info">
          <p>Amount of shaking vessels:</p>
          <input id="i_n_vessels" type="text" />
        </div>
        <div class="buttons">
          <button id="n_vessels_button">Vessels</button>
          <button id="extract">Extract</button>
          <button id="clear">Clear</button>
        </div>
      </div>
      <div id="results">

      </div>
